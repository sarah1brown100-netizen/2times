<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Verified</title>

<style>
body {
margin: 0;
font-family: Arial, Helvetica, sans-serif;
background: #f5f7fa;
}

.header {
padding: 20px;
font-size: 22px;
font-weight: bold;
color: #000;
border-bottom: 4px solid #0072ce;
}

.container {
max-width: 400px;
margin: 60px auto;
background: white;
padding: 30px;
border-radius: 8px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.container p {
font-size: 14px;
color: #333;
margin-bottom: 20px;
}

input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: 1px solid #ccc;
border-radius: 4px;
}

.help {
margin-top: 10px;
font-size: 14px;
}

.help strong {
display: block;
margin-bottom: 5px;
}

.help a {
color: #0072ce;
text-decoration: none;
}

.help a:hover {
text-decoration: underline;
}

.buttons {
display: flex;
justify-content: space-between;
margin-top: 20px;
}

.cancel {
padding: 12px 20px;
background: #ccc;
border: none;
border-radius: 4px;
cursor: pointer;
}

.next {
padding: 12px 20px;
background: #0072ce;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
}

.next:hover {
background: #005ea6;
}
</style>
</head>

<body>

<div class="header">Get Verified</div>

<div class="container">
<p>
We sent you a text message. Please tell us your one-time code along with your sign-in password and choose Next.
</p>

<input type="text" placeholder="One-time code">
<input type="password" placeholder="Password">

<div class="help">
<strong>Didn’t get a code?</strong>
<a href="#">Let’s try again</a>
</div>

<div class="buttons">
<button class="cancel" onclick="history.back()">Cancel</button>
<button class="next">Next</button>
</div>
</div>

</body>
</html>
