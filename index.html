<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHASE Login</title>
<style>
/* Basic reset */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: Arial, sans-serif;
}

body {
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
background: #0a2540; /* Dark blue */
color: white;
}

.login-container {
background: #1f3b6f;
padding: 40px;
border-radius: 10px;
box-shadow: 0 4px 15px rgba(0,0,0,0.5);
width: 350px;
text-align: center;
}

.logo-text {
font-size: 60px;
font-weight: 800;
letter-spacing: 6px;
margin-bottom: 30px;
}

input[type="text"], input[type="password"] {
width: 100%;
padding: 12px 15px;
margin: 10px 0 20px 0;
border: none;
border-radius: 5px;
font-size: 16px;
}

.options {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
font-size: 14px;
}

.options label {
display: flex;
align-items: center;
gap: 5px;
}

button {
width: 100%;
padding: 12px;
background: #0072ce;
border: none;
border-radius: 5px;
font-size: 18px;
color: white;
font-weight: bold;
cursor: pointer;
transition: background 0.3s;
}

button:hover {
background: #005ea6;
}

a {
display: block;
margin-top: 15px;
color: #87c0f9;
text-decoration: none;
font-size: 14px;
}

a:hover {
text-decoration: underline;
}
</style>
</head>
<body>
<div class="login-container">
<div class="logo-text">CHASE</div>
<form>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<div class="options">
<label><input type="checkbox"> Remember me</label>
<label><input type="checkbox"> Stay logged in</label>
</div>
<button type="submit">Log In</button>
</form>
<a href="#">Forgot Username / Password?</a>
</div>
</body>
</html>
