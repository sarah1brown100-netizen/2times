<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHASE Login</title>
<style>
body {
margin: 0;
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background: linear-gradient(to right, #0a2540, #1f5fa5);
font-family: Arial, sans-serif;
color: white;
}

.logo-text {
font-size: 72px;
font-weight: bold;
letter-spacing: 5px;
margin-bottom: 40px;
display: flex;
gap: 0;
}

.logo-text .c {
/* Squared C effect */
display: inline-block;
width: 1em;
height: 1em;
line-height: 1em;
border: 0.12em solid white;
border-radius: 0.15em; /* slightly rounded corners */
text-align: center;
position: relative;
}

.logo-text .c::before {
content: "";
position: absolute;
top: 0;
left: 50%;
width: 0.12em;
height: 100%;
background: #0a2540; /* hides inner circle to make it squared */
transform: translateX(-50%);
}

.container {
background: #fff;
padding: 30px 40px;
border-radius: 8px;
width: 360px;
box-shadow: 0 0 15px rgba(0,0,0,0.3);
text-align: center;
color: #333;
}

input[type="text"], input[type="password"] {
width: 100%;
padding: 10px 12px;
margin: 8px 0;
border: 1px solid #ccc;
border-radius: 4px;
}

.options {
display: flex;
justify-content: space-between;
margin: 15px 0;
font-size: 14px;
}

.options label {
display: flex;
align-items: center;
gap: 5px;
}

button {
width: 100%;
padding: 10px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-weight: bold;
}

button:hover {
background-color: #003366;
}
</style>
</head>
<body>

<div class="logo-text">
<span class="c"></span>
<span>HASE</span>
</div>

<div class="container">
<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox" name="remember"> Remember me</label>
<label><input type="checkbox" name="stay"> Stay logged in</label>
</div>

<button type="submit">Login</button>
</form>
</div>

</body>
</html>
