<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase Login</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #e6f0fa; /* light blue background */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.login-container {
background-color: #ffffff;
padding: 40px 30px;
border-radius: 12px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
width: 320px;
text-align: center;
}

.login-container img {
width: 120px;
height: auto;
margin-bottom: 20px;
}

.login-container h2 {
margin: 10px 0 30px;
color: #0b234f; /* dark blue */
font-weight: normal;
}

.login-container input {
width: 100%;
padding: 12px 15px;
margin: 10px 0;
border-radius: 6px;
border: 1px solid #ccc;
font-size: 14px;
}

.login-container button {
width: 100%;
padding: 12px;
margin-top: 20px;
border: none;
border-radius: 6px;
background-color: #0070ce; /* Chase blue */
color: white;
font-size: 16px;
cursor: pointer;
}

.login-container button:hover {
background-color: #005bb5;
}

.login-container a {
display: block;
margin-top: 15px;
color: #0070ce;
text-decoration: none;
font-size: 14px;
}

.login-container a:hover {
text-decoration: underline;
}
</style>
</head>
<body>

<div class="login-container">
<!-- Logo -->
<img alt="Chase Logo" src="https://brandfetch.io/logo/brand/chase.svg">

<h2>Sign in to your account</h2>

<!-- Login Form -->
<form>
<input type="text" placeholder="Username or Email" required>
<input type="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<a href="#">Forgot username/password?</a>
<a href="#">Create an account</a>
</div>

</body>
</html>
