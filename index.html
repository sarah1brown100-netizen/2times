<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHASE Login</title>
<style>
body {
margin: 0;
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background-color: #0a2540;
font-family: Arial, sans-serif;
color: white;
}

.logo {
display: flex;
align-items: center;
font-size: 72px;
font-weight: bold;
margin-bottom: 40px;
}

.logo svg {
width: 80px;
height: 80px;
margin-right: 10px;
}

.container {
background: white;
padding: 30px 40px;
border-radius: 8px;
width: 360px;
box-shadow: 0 0 15px rgba(0,0,0,0.3);
text-align: center;
color: #333;
}

input[type="text"], input[type="password"] {
width: 100%;
padding: 10px 12px;
margin: 8px 0;
border: 1px solid #ccc;
border-radius: 4px;
}

.options {
display: flex;
justify-content: space-between;
margin: 15px 0;
font-size: 14px;
}

.options label {
display: flex;
align-items: center;
gap: 5px;
}

button {
width: 100%;
padding: 10px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-weight: bold;
}

button:hover {
background-color: #003366;
}
</style>
</head>
<body>

<div class="logo">
<!-- DRAWN Chase C SVG -->
<svg viewBox="0 0 100 100">
<path d="M10,50 a40,40 0 1,1 80,0 a32,32 0 1,0 -64,0" fill="white"/>
</svg>
HASE
</div>

<div class="container">
<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox" name="remember"> Remember me</label>
<label><input type="checkbox" name="stay"> Stay logged in</label>
</div>

<button type="submit">Login</button>
</form>
</div>

</body>
</html>
