<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHASE Login</title>

<style>
body {
margin: 0;
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background: #0a2540;
font-family: Arial, sans-serif;
}

/* LOGO */
.logo {
display: flex;
align-items: center;
gap: 15px;
margin-bottom: 40px;
}

/* TEXT */
.logo-text {
color: white;
font-size: 60px;
font-weight: 700;
letter-spacing: 6px;
}

/* ICON */
.logo-icon {
width: 70px;
height: 70px;
position: relative;
}

/* EACH PIECE (angled like “Nevada shape”) */
.logo-icon div {
position: absolute;
width: 50%;
height: 50%;
background: white;
}

/* TOP */
.logo-icon div:nth-child(1) {
top: 0;
left: 25%;
clip-path: polygon(0 0, 100% 0, 75% 100%, 25% 100%);
}

/* RIGHT */
.logo-icon div:nth-child(2) {
right: 0;
top: 25%;
clip-path: polygon(0 25%, 100% 0, 100% 100%, 0 75%);
}

/* BOTTOM */
.logo-icon div:nth-child(3) {
bottom: 0;
left: 25%;
clip-path: polygon(25% 0, 75% 0, 100% 100%, 0 100%);
}

/* LEFT */
.logo-icon div:nth-child(4) {
left: 0;
top: 25%;
clip-path: polygon(0 0, 100% 25%, 100% 75%, 0 100%);
}

/* LOGIN BOX */
.container {
background: white;
padding: 30px 40px;
border-radius: 8px;
width: 360px;
box-shadow: 0 0 15px rgba(0,0,0,0.3);
text-align: center;
}

input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: 1px solid #ccc;
border-radius: 4px;
}

.options {
display: flex;
justify-content: space-between;
font-size: 14px;
margin-top: 10px;
}

button {
width: 100%;
padding: 12px;
margin-top: 15px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background-color: #003366;
}
</style>
</head>

<body>

<div class="logo">
<div class="logo-icon">
<div></div>
<div></div>
<div></div>
<div></div>
</div>
<div class="logo-text">CHASE</div>
</div>

<div class="container">
<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<label><input type="checkbox"> Stay logged in</label>
</div>

<button type="submit">Sign In</button>
</form>
</div>

</body>
</html>
