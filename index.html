<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login with Approx Logo</title>
<style>
body {
margin: 0;
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background-color: #0a2540;
font-family: Arial, sans-serif;
color: white;
}
.logo {
display: flex;
align-items: center;
font-size: 64px;
font-weight: bold;
letter-spacing: 4px;
margin-bottom: 30px;
}
.logo svg {
width: 90px;
height: 90px;
margin-right: 12px;
}
.container {
background: #fff;
padding: 30px 40px;
border-radius: 8px;
width: 360px;
box-shadow: 0 0 15px rgba(0,0,0,0.3);
text-align: center;
color: #333;
}
input[type="text"], input[type="password"] {
width: 100%;
padding: 10px;
margin: 8px 0;
border: 1px solid #ccc;
border-radius: 4px;
}
.options {
display: flex;
justify-content: space-between;
font-size: 14px;
margin-top: 12px;
}
.options label {
display: flex;
align-items: center;
gap: 5px;
}
button {
width: 100%;
padding: 10px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-weight: bold;
margin-top: 15px;
}
button:hover {
background-color: #003366;
}
</style>
</head>
<body>

<div class="logo">
<!-- Approximate Chase‑style “C” -->
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
<path fill="#fff" d="
M60,0
L110,0
L120,10
L120,50
L100,50
L100,20
L80,20
L80,40
L60,40
Z
M0,50
L0,100
L60,100
L60,80
L20,80
L20,60
L60,60
Z
"/>
</svg>
HASE
</div>

<div class="container">
<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox" name="remember"> Remember me</label>
<label><input type="checkbox" name="stay"> Stay logged in</label>
</div>

<button type="submit">Login</button>
</form>
</div>

</body>
</html>
