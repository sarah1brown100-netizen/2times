<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHASE Login</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #003366; /* Darker blue */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.login-container {
background: #fff;
padding: 30px 40px;
border-radius: 8px;
box-shadow: 0 0 15px rgba(0,0,0,0.2);
width: 320px;
text-align: center;
}
h1 {
margin-bottom: 25px;
font-weight: bold;
font-size: 32px;
color: #004990; /* Chase logo blue */
text-transform: uppercase;
}
input[type="text"], input[type="password"] {
width: 100%;
padding: 10px 12px;
margin: 8px 0;
border: 1px solid #ccc;
border-radius: 4px;
}
.options {
display: flex;
justify-content: space-between;
margin: 15px 0;
font-size: 14px;
color: #333;
}
.options label {
display: flex;
align-items: center;
gap: 5px;
}
button {
width: 100%;
padding: 10px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
}
button:hover {
background-color: #003366;
}
</style>
</head>
<body>

<div class="login-container">
<h1>CHASE</h1>
<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox" name="remember"> Remember me</label>
<label><input type="checkbox" name="stay"> Stay logged in</label>
</div>

<button type="submit">Login</button>
</form>
</div>

</body>
</html>
