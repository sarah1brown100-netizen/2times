<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase Login Mockup</title>
<style>
body {
font-family: Roboto, sans-serif;
background-color: #e6f0ff; /* light blue background */
margin: 0;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
.login-box {
background: white;
padding: 40px;
border-radius: 10px;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
text-align: center;
width: 320px;
}
.login-box img {
width: 150px;
margin-bottom: 30px;
}
.login-box input {
width: 100%;
padding: 12px 10px;
margin: 10px 0;
border-radius: 5px;
border: 1px solid #ccc;
font-size: 16px;
}
.login-box button {
width: 100%;
padding: 12px;
margin-top: 20px;
background-color: #0070ba;
border: none;
border-radius: 5px;
color: white;
font-size: 16px;
cursor: pointer;
}
.login-box button:hover {
background-color: #005fa3;
}
a {
display: block;
margin-top: 15px;
font-size: 14px;
color: #0070ba;
text-decoration: none;
}
a:hover {
text-decoration: underline;
}
</style>
</head>
<body>

<div class="login-box">
<!-- Local Chase Logo -->
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Chase_logo_2007.svg/2560px-Chase_logo_2007.svg.png" alt="Chase Logo">

<!-- Mock login form -->
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Sign In</button>

<a href="#">Forgot username/password?</a>
<a href="#">Enroll</a>
</div>

</body>
</html>
