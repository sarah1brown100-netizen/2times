<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHASE Login</title>
<style>
body {
margin: 0;
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background: #0a2540;
font-family: Arial, Helvetica, sans-serif;
}

/* CHASE TEXT */
.logo {
position: relative;
color: white;
font-size: 70px;
font-weight: 900;
letter-spacing: 6px;
margin-bottom: 40px;
font-family: "Arial Black", Arial, sans-serif;
}

/* Make the "C" more like the Chase logo */
.logo::before {
content: "C";
position: absolute;
left: 0;
top: 0;
color: white;
font-size: 70px;
font-weight: 900;
font-family: "Arial Black", Arial, sans-serif;
clip-path: polygon(0 0, 70% 0, 70% 100%, 0 100%); /* create the open part of C */
}

.logo span {
margin-left: 10px; /* push HASE to align with modified C */
}

/* LOGIN BOX */
.container {
background: white;
padding: 30px 40px;
border-radius: 8px;
width: 360px;
box-shadow: 0 0 15px rgba(0,0,0,0.3);
text-align: center;
}

input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: 1px solid #ccc;
border-radius: 4px;
}

/* CHECKBOX ROW */
.options {
display: flex;
justify-content: space-between;
font-size: 14px;
margin-top: 10px;
}

.options label {
display: flex;
align-items: center;
gap: 5px;
}

/* BUTTON */
button {
width: 100%;
padding: 12px;
margin-top: 15px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background-color: #003366;
}
</style>
</head>
<body>

<div class="logo"><span>HASE</span></div>

<div class="container">
<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<label><input type="checkbox"> Stay logged in</label>
</div>

<button type="submit">Sign In</button>
</form>
</div>

</body>
</html>
