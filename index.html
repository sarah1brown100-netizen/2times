<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHASE Login</title>
<style>
body {
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
background: linear-gradient(to right, #0a2540, #1f5fa5);
font-family: Arial, sans-serif;
}

.container {
background: #fff;
padding: 30px 40px;
border-radius: 8px;
box-shadow: 0 0 15px rgba(0,0,0,0.2);
text-align: center;
width: 360px;
}

.logo-container {
display: flex;
align-items: center;
justify-content: center;
gap: 20px;
margin-bottom: 30px;
}

.text {
color: white;
font-size: 48px;
font-weight: bold;
letter-spacing: 5px;
}

.logo-box {
width: 40px;
height: 40px;
position: relative;
}

.logo-box div {
position: absolute;
width: 17px;
height: 17px;
background: white;
}

/* Top */
.logo-box div:nth-child(1) { top: 0; left: 11px; }
/* Right */
.logo-box div:nth-child(2) { top: 11px; right: 0; }
/* Bottom */
.logo-box div:nth-child(3) { bottom: 0; left: 11px; }
/* Left */
.logo-box div:nth-child(4) { top: 11px; left: 0; }

input[type="text"], input[type="password"] {
width: 100%;
padding: 10px 12px;
margin: 8px 0;
border: 1px solid #ccc;
border-radius: 4px;
}

.options {
display: flex;
justify-content: space-between;
margin: 15px 0;
font-size: 14px;
color: #333;
}

.options label {
display: flex;
align-items: center;
gap: 5px;
}

button {
width: 100%;
padding: 10px;
background-color: #004990;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-weight: bold;
}

button:hover {
background-color: #003366;
}
</style>
</head>
<body>

<div class="container">
<div class="logo-container">
<div class="text">CHASE</div>
<div class="logo-box">
<div></div>
<div></div>
<div></div>
<div></div>
</div>
</div>

<form>
<input type="text" placeholder="Username or email" required>
<input type="password" placeholder="Password" required>

<div class="options">
<label><input type="checkbox" name="remember"> Remember me</label>
<label><input type="checkbox" name="stay"> Stay logged in</label>
</div>

<button type="submit">Login</button>
</form>
</div>

</body>
</html>
